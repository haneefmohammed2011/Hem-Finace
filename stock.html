<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.E.M Finance Stock</title>

<style>
body{
    font-family:Inter,sans-serif;
    background:#fff;
    margin:0;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.symbol{
    font-size:4rem;
    font-weight:900;
    color:#003399;
}

.price{
    font-size:3rem;
    margin-top:20px;
}

.card{
    border:1px solid #e2e8f0;
    padding:25px;
    border-radius:12px;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="container">

    <div id="symbol" class="symbol">
        Loading...
    </div>

    <div class="price">
        $--
    </div>

    <div class="card">
        <h3>Company Overview</h3>
        <p>
            This section will later be powered by your
            H.E.M Finance API.
        </p>
    </div>

    <div class="card">
        <h3>Market Statistics</h3>
        <p>Coming Soon</p>
    </div>

    <div class="card">
        <h3>H.E.M AI Analysis</h3>
        <p>Coming Soon</p>
    </div>

    <div class="card">
        <h3>News</h3>
        <p>Coming Soon</p>
    </div>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const symbol =
params.get("symbol") || "UNKNOWN";

document.getElementById(
"symbol"
).textContent =
symbol.toUpperCase();

document.title =
`${symbol.toUpperCase()} | H.E.M Finance`;

</script>

</body>
</html>
